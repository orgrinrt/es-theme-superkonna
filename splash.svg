<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080">
  <!-- Clean dark background -->
  <rect width="1920" height="1080" fill="#0E1117"/>

  <!-- Subtle radial gradient center glow -->
  <defs>
    <radialGradient id="glow" cx="50%" cy="45%" r="40%">
      <stop offset="0%" stop-color="#182235" stop-opacity="1"/>
      <stop offset="100%" stop-color="#0E1117" stop-opacity="1"/>
    </radialGradient>
  </defs>
  <rect width="1920" height="1080" fill="url(#glow)"/>

  <!-- Minimal "S" monogram — geometric, modern -->
  <text x="960" y="480" text-anchor="middle" font-family="Inter, Helvetica, Arial, sans-serif" font-weight="100" font-size="280" fill="#EAEDF3" opacity="0.08" letter-spacing="40">S</text>

  <!-- Thin horizontal line accent -->
  <rect x="860" y="540" width="200" height="1.5" rx="0.75" fill="#D64060" opacity="0.6"/>
</svg>
